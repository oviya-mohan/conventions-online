  Words: <span id="word-count">0</span> / 50
</div>

{{ next_button }} {{ endblock }} {{ block scripts }}
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const textarea = document.querySelector("textarea");
    const countDisplay = document.getElementById("word-count");
    const nextButton = document.querySelector(".otree-next-button");
    const MAX_WORDS = 50;

    textarea.addEventListener("input", function () {
      // Split by spaces, newlines, and tabs, filtering out empty results
      const words = this.value
        .trim()
        .split(/\s+/)
        .filter((w) => w.length > 0);
      const currentCount = words.length;

      countDisplay.innerText = currentCount;

      if (currentCount > MAX_WORDS) {
        // UI feedback for being over the limit
        countDisplay.classList.add("limit-exceeded");
        nextButton.disabled = true;
        nextButton.innerText = "Too many words";
      } else {
        countDisplay.classList.remove("limit-exceeded");
        nextButton.disabled = false;
        nextButton.innerText = "Next";
      }
    });
  });
</script>
{{ endblock }}
